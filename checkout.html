<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - APSE Shopping</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <header class="header">
        <!-- ... header content ... -->
    </header>

    <!-- Page Banner -->
    <section class="page-banner">
        <div class="container">
            <h1>Checkout</h1>
            <div class="breadcrumb">
                <a href="index.html">Home</a> / 
                <a href="cart.html">Cart</a> / 
                <span>Checkout</span>
            </div>
        </div>
    </section>

    <!-- Checkout Section -->
    <section class="checkout-section">
        <div class="container">
            <div class="checkout-container">
                <!-- Checkout Steps -->
                <div class="checkout-steps">
                    <div class="step active" data-step="1">
                        <span class="step-number">1</span>
                        <span class="step-title">Shipping Information</span>
                    </div>
                    <div class="step" data-step="2">
                        <span class="step-number">2</span>
                        <span class="step-title">Payment Method</span>
                    </div>
                    <div class="step" data-step="3">
                        <span class="step-number">3</span>
                        <span class="step-title">Review Order</span>
                    </div>
                </div>

                <!-- Checkout Forms -->
                <div class="checkout-content">
                    <!-- Step 1: Shipping Information -->
                    <div class="checkout-step active" id="step1">
                        <h2>Shipping Information</h2>
                        <form id="shippingForm">
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="firstName">First Name *</label>
                                    <input type="text" id="firstName" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label for="lastName">Last Name *</label>
                                    <input type="text" id="lastName" class="form-control" required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="email">Email Address *</label>
                                <input type="email" id="email" class="form-control" required>
                            </div>

                            <div class="form-group">
                                <label for="phone">Phone Number *</label>
                                <input type="tel" id="phone" class="form-control" required>
                            </div>

                            <div class="form-group">
                                <label for="address">Street Address *</label>
                                <input type="text" id="address" class="form-control" required>
                            </div>

                            <div class="form-group">
                                <label for="apartment">Apartment, Suite, etc. (optional)</label>
                                <input type="text" id="apartment" class="form-control">
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="city">City *</label>
                                    <input type="text" id="city" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label for="state">State *</label>
                                    <select id="state" class="form-control" required>
                                        <option value="">Select State</option>
                                        <option value="AL">Alabama</option>
                                        <option value="AK">Alaska</option>
                                        <option value="AZ">Arizona</option>
                                        <option value="AR">Arkansas</option>
                                        <option value="CA">California</option>
                                        <option value="CO">Colorado</option>
                                        <option value="CT">Connecticut</option>
                                        <option value="DE">Delaware</option>
                                        <option value="FL">Florida</option>
                                        <option value="GA">Georgia</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="zipCode">ZIP Code *</label>
                                    <input type="text" id="zipCode" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label for="country">Country *</label>
                                    <select id="country" class="form-control" required>
                                        <option value="US">United States</option>
                                        <option value="CA">Canada</option>
                                        <option value="UK">United Kingdom</option>
                                        <option value="AU">Australia</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-group">
                                <label class="checkbox-label">
                                    <input type="checkbox" id="saveInfo">
                                    Save this information for next time
                                </label>
                            </div>

                            <div class="form-actions">
                                <button type="button" class="btn btn-outline" onclick="window.location.href='cart.html'">
                                    <i class="fas fa-arrow-left"></i> Back to Cart
                                </button>
                                <button type="button" class="btn btn-primary" onclick="nextStep(2)">
                                    Continue to Payment <i class="fas fa-arrow-right"></i>
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- Step 2: Payment Method -->
                    <div class="checkout-step" id="step2">
                        <h2>Payment Method</h2>
                        <form id="paymentForm">
                            <div class="payment-methods">
                                <div class="payment-method">
                                    <input type="radio" name="paymentMethod" id="creditCard" value="credit" checked>
                                    <label for="creditCard">
                                        <i class="fas fa-credit-card"></i>
                                        Credit / Debit Card
                                    </label>
                                </div>
                                <div class="payment-method">
                                    <input type="radio" name="paymentMethod" id="paypal" value="paypal">
                                    <label for="paypal">
                                        <i class="fab fa-paypal"></i>
                                        PayPal
                                    </label>
                                </div>
                                <div class="payment-method">
                                    <input type="radio" name="paymentMethod" id="applePay" value="apple">
                                    <label for="applePay">
                                        <i class="fab fa-apple"></i>
                                        Apple Pay
                                    </label>
                                </div>
                                <div class="payment-method">
                                    <input type="radio" name="paymentMethod" id="googlePay" value="google">
                                    <label for="googlePay">
                                        <i class="fab fa-google"></i>
                                        Google Pay
                                    </label>
                                </div>
                            </div>

                            <div class="credit-card-form" id="creditCardForm">
                                <div class="form-group">
                                    <label for="cardNumber">Card Number *</label>
                                    <input type="text" id="cardNumber" class="form-control" placeholder="1234 5678 9012 3456">
                                </div>

                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="expiryDate">Expiry Date *</label>
                                        <input type="text" id="expiryDate" class="form-control" placeholder="MM/YY">
                                    </div>
                                    <div class="form-group">
                                        <label for="cvv">CVV *</label>
                                        <input type="text" id="cvv" class="form-control" placeholder="123">
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label for="cardName">Name on Card *</label>
                                    <input type="text" id="cardName" class="form-control">
                                </div>
                            </div>

                            <div class="form-actions">
                                <button type="button" class="btn btn-outline" onclick="prevStep(1)">
                                    <i class="fas fa-arrow-left"></i> Back to Shipping
                                </button>
                                <button type="button" class="btn btn-primary" onclick="nextStep(3)">
                                    Continue to Review <i class="fas fa-arrow-right"></i>
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- Step 3: Review Order -->
                    <div class="checkout-step" id="step3">
                        <h2>Review Your Order</h2>
                        
                        <div class="review-sections">
                            <div class="review-section">
                                <h3>Shipping Address</h3>
                                <div id="reviewAddress"></div>
                                <button class="btn-edit" onclick="prevStep(1)">Edit</button>
                            </div>

                            <div class="review-section">
                                <h3>Payment Method</h3>
                                <div id="reviewPayment"></div>
                                <button class="btn-edit" onclick="prevStep(2)">Edit</button>
                            </div>

                            <div class="review-section">
                                <h3>Order Items</h3>
                                <div id="reviewItems"></div>
                            </div>
                        </div>

                        <div class="order-summary">
                            <h3>Order Summary</h3>
                            <div id="orderSummary"></div>
                        </div>

                        <div class="form-actions">
                            <button type="button" class="btn btn-outline" onclick="prevStep(2)">
                                <i class="fas fa-arrow-left"></i> Back to Payment
                            </button>
                            <button type="button" class="btn btn-primary" onclick="placeOrder()">
                                Place Order <i class="fas fa-check"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Order Summary Sidebar -->
                <div class="checkout-sidebar">
                    <h3>Your Order</h3>
                    <div class="order-items" id="orderItems"></div>
                    <div class="order-totals" id="orderTotals"></div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <!-- ... footer content ... -->
    </footer>

    <button class="back-to-top" id="backToTop">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script src="js/utils.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/checkout.js"></script>
</body>
</html>
